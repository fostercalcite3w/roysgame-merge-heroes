<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>合成王</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; height: 100dvh; overflow: hidden; background: #0f1020; }
    canvas { display: block; position: relative; touch-action: none; z-index: 1; }
    #rotate-msg { display: none; }
    #title-screen { display: none; }
    #gameover-screen { display: none; }
    #hud { display: none; }
    #touch-overlay { display: none; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="rotate-msg">
    <div class="icon">📱↪️</div>
    <div class="text">請將手機轉為橫向</div>
  </div>
  <div id="title-screen">
    <h1 class="title-logo">合成王</h1>
    <p class="title-subtitle">5×5 格子塔防合成</p>
    <button id="title-start" class="title-start">開始冒險</button>
    <p class="title-hint">鍵盤 WASD + Space 選取 / 觸控：點英雄再點相鄰格</p>
  </div>
  <div id="hud">
    <div class="hud-top">
      <span id="hud-wave">第 1 波</span>
      <div class="hud-hp-bar"><div id="hud-hp-fill"></div></div>
      <span id="hud-hp-text">500 / 500</span>
    </div>
    <div class="hud-bottom">
      <span id="hud-step">步數 0 / 5</span>
    </div>
  </div>
  <div id="touch-overlay"></div>
  <div id="gameover-screen">
    <h1 id="gameover-title">城堡陷落！</h1>
    <p id="gameover-waves">撐到第 0 波</p>
    <button id="gameover-restart" class="gameover-restart">再來一次</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
